name: Web Audit & QA

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  audit:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run QA Tests
      run: chmod +x qa.sh && ./qa.sh
    
    - name: Build project
      run: npm run build
    
    - name: Run Lighthouse CI
      uses: treosh/lighthouse-ci-action@v9
      with:
        configPath: './lighthouserc.json'
        uploadArtifacts: true
        temporaryPublicStorage: true
    
    - name: Check bundle size
      run: |
        npm install -g bundlesize
        bundlesize
    
    - name: SEO Analysis
      run: |
        echo "🔍 SEO Analysis Results:"
        echo "📊 Events in sitemap: $(grep -c 'events/' public/sitemap.xml || echo '0')"
        echo "📄 Event pages generated: $(find public/events -name 'index.html' | wc -l || echo '0')"
        echo "🎯 Meta descriptions: $(grep -r 'meta name=\"description\"' public/events/ | wc -l || echo '0')"
        echo "📱 Open Graph tags: $(grep -r 'property=\"og:' public/events/ | wc -l || echo '0')"
        echo "🔗 Structured data: $(grep -r 'application/ld+json' public/events/ | wc -l || echo '0')"