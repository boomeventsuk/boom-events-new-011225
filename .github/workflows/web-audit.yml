name: Web Audit & QA

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  audit:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run QA Tests
      run: chmod +x qa.sh && ./qa.sh
    
    - name: Build project
      run: npm run build
    
    - name: Run Lighthouse CI
      uses: treosh/lighthouse-ci-action@v12
      with:
        configPath: './lighthouserc.json'
        temporaryPublicStorage: true
    
    - name: Check bundle size
      run: |
        npm install -g bundlesize
        bundlesize
    
    - name: SEO Analysis
      run: |
        echo "SEO Analysis Results:"
        echo "Events in sitemap: $(grep -c '/event/' public/sitemap.xml || echo '0')"
        echo "City pages: $(find public/locations -name 'index.html' | wc -l | tr -d ' ')"
        echo "Total sitemap URLs: $(grep -c '<loc>' public/sitemap.xml || echo '0')"
        echo "Structured data (city pages): $(grep -rl 'application/ld+json' public/locations/ | wc -l | tr -d ' ')"