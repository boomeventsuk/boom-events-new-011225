# netlify.toml — put at repository root
[build]
  command = "npm run build"
  publish = "dist"

# Edge function for dynamic OG tags on event pages
[[edge_functions]]
  function = "og-event"
  path = "/event/*"

# Backward compatibility if any old /events/ links exist
[[edge_functions]]
  function = "og-event"
  path = "/events/*"

# SPA fallback for client-side routes — available to everyone
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200